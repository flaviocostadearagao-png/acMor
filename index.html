<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedalMatch 🚲 - Red Social para Ciclistas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative pb-20">
        <!-- Main App Views -->
        <div id="main-ui">
            <!-- Header -->
            <header class="p-6 flex items-center justify-between sticky top-0 bg-white/80 backdrop-blur-md z-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="bike" class="text-white w-6 h-6"></i>
                    </div>
                    <span class="font-bold text-xl">PedalMatch</span>
                </div>
                <button id="btn-login-header" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border-2 border-white shadow-sm">
                    <i data-lucide="user" class="text-slate-400 w-5 h-5"></i>
                </button>
            </header>

            <!-- Tracking (Default) -->
            <div id="view-tracking" class="tab-content active p-6">
                <div class="bg-slate-900 rounded-3xl p-8 text-white mb-6 text-center">
                    <div class="text-6xl font-bold mb-2" id="timer">00:00</div>
                    <div class="grid grid-cols-2 gap-4 mt-8">
                        <div>
                            <div class="text-slate-400 text-sm mb-1 uppercase tracking-wider">Distância</div>
                            <div class="text-2xl font-semibold" id="distance">0.0 km</div>
                        </div>
                        <div>
                            <div class="text-slate-400 text-sm mb-1 uppercase tracking-wider">Velocidade</div>
                            <div class="text-2xl font-semibold" id="speed">0.0 km/h</div>
                        </div>
                    </div>
                </div>
                
                <!-- Map Container -->
                <div id="map" class="w-full h-48 bg-slate-100 rounded-3xl mb-6 overflow-hidden border border-slate-200">
                    <div class="w-full h-full flex items-center justify-center text-slate-400 text-sm">
                        Mapa carregando...
                    </div>
                </div>

                <button id="btn-toggle-tracking" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200">
                    Iniciar Pedal
                </button>
            </div>

            <!-- Ranking -->
            <div id="view-ranking" class="tab-content p-6">
                <h2 class="text-2xl font-bold mb-6">Ranking Semanal</h2>
                <div id="ranking-list" class="space-y-3">
                    <!-- Ranking items -->
                </div>
            </div>

            <!-- Bottom Navigation -->
            <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-lg border-t border-slate-100 p-3 flex justify-around">
                <button onclick="showTab('tracking')" class="nav-btn p-4 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-200" data-tab="tracking">
                    <i data-lucide="play"></i>
                </button>
                <button onclick="showTab('ranking')" class="nav-btn p-3 text-slate-600 hover:text-blue-600 transition-colors" data-tab="ranking">
                    <i data-lucide="trophy"></i>
                </button>
            </nav>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Inicializar ícones
        lucide.createIcons();
        
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            
            // Highlight button
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('text-blue-600');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('text-blue-600');
                    if (!btn.classList.contains('bg-blue-600')) btn.classList.add('text-slate-400');
                }
            });
        }
    </script>
</body>
</html>
